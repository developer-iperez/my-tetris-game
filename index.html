<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
</head>
<body>
  <main class="game">
    <h1>Tetris</h1>
    <canvas id="board" width="300" height="600"></canvas>
    <aside class="hud">
      <p>Puntuación: <span id="score">0</span></p>
      <p>Líneas: <span id="lines">0</span></p>
      <p>Nivel: <span id="level">1</span></p>
      <p id="game-over" hidden>Game Over</p>
      <p id="paused" hidden>Pausa</p>
      <div class="controls">
        <button id="pause-btn" type="button">Pausa</button>
        <button id="restart-btn" type="button">Reiniciar</button>
      </div>
    </aside>
  </main>
  <script type="module" src="dist/app.js"></script>
</body>
</html>
